<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Demo API - .NET Style</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); font-family: 'Segoe UI', sans-serif; }
        .container { padding: 50px 20px; }
        .card { border-radius: 20px; box-shadow: 0 20px 40px rgba(0,0,0,0.2); }
        .api-response { background: #1e1e2e; color: #4ec9b0; padding: 15px; border-radius: 10px; font-family: monospace; font-size: 0.9rem; white-space: pre-wrap; }
        .btn-postman { background: #ff6c37; color: white; }
    </style>
</head>
<body>
    <div class="container">
        <div class="card p-4">
            <h1><i class="fas fa-globe"></i> 🌐 .NET Core Web API Demo</h1>
            <p>Simulando endpoints RESTful con JSON real</p>
            
            <div class="row mt-4">
                <div class="col-md-4">
                    <button class="btn btn-primary w-100 mb-2" onclick="fetchUsers()">📋 GET /api/users</button>
                </div>
                <div class="col-md-4">
                    <button class="btn btn-success w-100 mb-2" onclick="fetchProducts()">🛒 GET /api/products</button>
                </div>
                <div class="col-md-4">
                    <button class="btn btn-warning w-100 mb-2" onclick="postExample()">✏️ POST /api/contact</button>
                </div>
            </div>

            <div class="mt-4">
                <h5>📡 Respuesta de la API:</h5>
                <div id="apiResponse" class="api-response">
                    { "mensaje": "Haz clic en un botón para ver la respuesta JSON" }
                </div>
            </div>

            <div class="mt-3">
                <button class="btn btn-postman" onclick="showPostmanCollection()">
                    📥 Descargar colección para Postman
                </button>
            </div>
        </div>
    </div>

    <script src="https://kit.fontawesome.com/a1c7f4eef9.js" crossorigin="anonymous"></script>
    <script>
        function fetchUsers() {
            const users = [
                { id: 1, name: "Carlos Mendoza", email: "carlos@empresa.com", role: "Admin" },
                { id: 2, name: "Ana López", email: "ana@empresa.com", role: "User" },
                { id: 3, name: "Luis Torres", email: "luis@empresa.com", role: "Developer" }
            ];
            displayResponse(users, "GET /api/users");
        }

        function fetchProducts() {
            const products = [
                { id: 101, name: "Laptop Gamer", price: 1200, stock: 15 },
                { id: 102, name: "Mouse Inalámbrico", price: 35, stock: 50 },
                { id: 103, name: "Teclado Mecánico", price: 85, stock: 30 }
            ];
            displayResponse(products, "GET /api/products");
        }

        function postExample() {
            const response = {
                status: "success",
                message: "Mensaje recibido correctamente",
                data: {
                    nombre: "Usuario Demo",
                    email: "demo@correo.com",
                    timestamp: new Date().toISOString()
                }
            };
            displayResponse(response, "POST /api/contact");
        }

        function displayResponse(data, endpoint) {
            const formatted = JSON.stringify(data, null, 2);
            document.getElementById('apiResponse').innerHTML = `
                <strong>🔗 Endpoint: ${endpoint}</strong><br>
                <strong>📦 Response:</strong><br>
                ${formatted}
                <hr>
                <i class="fas fa-check-circle"></i> Status: 200 OK
            `;
        }

        function showPostmanCollection() {
            const collection = {
                info: { name: "Mi Portfolio API", schema: "https://schema.getpostman.com/json/collection/v2.1.0/collection.json" },
                item: [
                    { name: "GET Usuarios", request: { method: "GET", url: "https://midemo.com/api/users" } },
                    { name: "GET Productos", request: { method: "GET", url: "https://midemo.com/api/products" } }
                ]
            };
            const dataStr = JSON.stringify(collection, null, 2);
            const blob = new Blob([dataStr], { type: "application/json" });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'postman_collection.json';
            a.click();
            URL.revokeObjectURL(url);
            alert("✅ Colección Postman descargada. ¡Imórtala en Postman!");
        }
    </script>
</body>
</html>
