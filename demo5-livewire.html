<!DOCTYPE html>
<html>
<head>
    <title>🔴 Laravel Livewire Demo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>
<body>
    <div class="container mt-5">
        <div class="card border-danger">
            <div class="card-header bg-danger text-white">
                <h3>🔴 Laravel 10 + Livewire - Componente en tiempo real</h3>
                <small>Sin recargar página, reactividad full</small>
            </div>
            <div class="card-body">
                <div class="livewire-component" id="counterComponent">
                    <h4>Contador Livewire:</h4>
                    <div class="display-1 text-center" id="livewireCounter">0</div>
                    <div class="text-center">
                        <button class="btn btn-primary btn-lg" onclick="incrementLivewire()">
                            + Incrementar
                        </button>
                        <button class="btn btn-secondary btn-lg" onclick="decrementLivewire()">
                            - Decrementar
                        </button>
                    </div>
                    <div class="mt-3 alert alert-info">
                        <strong>⚡ Reactividad sin AJAX manual</strong><br>
                        <span id="livewireMessage">Esperando acción...</span>
                    </div>
                </div>

                <hr>

                <div class="mt-4">
                    <h5>📝 Formulario Livewire (validación en tiempo real):</h5>
                    <input type="text" id="nombreInput" class="form-control" placeholder="Escribe tu nombre" onkeyup="updateNombre()">
                    <p id="nombrePreview" class="mt-2 text-muted"></p>
                </div>

                <div class="mt-3">
                    <button class="btn btn-outline-danger" onclick="simularWireNavigate()">
                        🔄 Simular navegación Livewire
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let counter = 0;

        function incrementLivewire() {
            counter++;
            updateUI();
            showMessage("✅ Evento 'increment' recibido por Livewire");
        }

        function decrementLivewire() {
            counter--;
            updateUI();
            showMessage("✅ Evento 'decrement' recibido por Livewire");
        }

        function updateUI() {
            document.getElementById('livewireCounter').innerText = counter;
            document.getElementById('livewireCounter').style.transform = 'scale(1.1)';
            setTimeout(() => {
                document.getElementById('livewireCounter').style.transform = 'scale(1)';
            }, 200);
        }

        function showMessage(msg) {
            document.getElementById('livewireMessage').innerHTML = `
                <i class="fas fa-bolt"></i> ${msg}<br>
                <small>Livewire actualiza solo lo necesario (DOM diffing)</small>
            `;
        }

        function updateNombre() {
            const nombre = document.getElementById('nombreInput').value;
            document.getElementById('nombrePreview').innerHTML = `
                <i class="fas fa-sync-alt"></i> Validando... 
                <strong>${nombre || "..."}</strong> - Modelo actualizado via wire:model
            `;
            if (nombre.length > 0) {
                document.getElementById('nombrePreview').style.color = 'green';
            }
        }

        function simularWireNavigate() {
            showMessage("🔄 Navegando a otra página sin recargar (Livewire navigation)");
            setTimeout(() => {
                alert("Demo: En un proyecto real, Livewire cambiaría la vista sin full page reload");
            }, 500);
        }
    </script>
    <script src="https://kit.fontawesome.com/a1c7f4eef9.js"></script>
</body>
</html>
