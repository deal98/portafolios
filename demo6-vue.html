<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>💚 Vue.js 3 Demo</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg, #42b883 0%, #35495e 100%); min-height: 100vh; padding: 50px; }
        .vue-card { border-radius: 20px; overflow: hidden; }
    </style>
</head>
<body>
    <div class="container">
        <div id="app" class="card vue-card shadow-lg">
            <div class="card-header bg-success text-white text-center">
                <h2>💚 Vue.js 3 - Composition API</h2>
                <p>Reactividad declarativa y componentes</p>
            </div>
            <div class="card-body">
                <div class="row">
                    <div class="col-md-6">
                        <h4>📝 Lista de tareas</h4>
                        <div class="input-group mb-3">
                            <input type="text" class="form-control" v-model="newTask" @keyup.enter="addTask" placeholder="Nueva tarea...">
                            <button class="btn btn-success" @click="addTask">Agregar</button>
                        </div>
                        <ul class="list-group">
                            <li v-for="(task, index) in tasks" :key="index" class="list-group-item d-flex justify-content-between">
                                <span :class="{ 'text-decoration-line-through': task.completed }">{{ task.text }}</span>
                                <div>
                                    <input type="checkbox" class="form-check-input me-2" v-model="task.completed">
                                    <button class="btn btn-sm btn-danger" @click="removeTask(index)">🗑️</button>
                                </div>
                            </li>
                        </ul>
                    </div>
                    <div class="col-md-6">
                        <h4>🔄 Contador Reactivo</h4>
                        <div class="text-center">
                            <div class="display-1 fw-bold text-success">{{ count }}</div>
                            <button class="btn btn-primary btn-lg mx-2" @click="increment">+1</button>
                            <button class="btn btn-warning btn-lg mx-2" @click="decrement">-1</button>
                            <button class="btn btn-secondary btn-lg mx-2" @click="reset">Reset</button>
                        </div>
                        <hr>
                        <h4>💬 Mensaje en tiempo real</h4>
                        <input type="text" class="form-control" v-model="message" placeholder="Escribe algo...">
                        <p class="mt-2 alert alert-info">Escribiste: <strong>{{ message }}</strong></p>
                    </div>
                </div>
            </div>
            <div class="card-footer text-muted text-center">
                <small>⚡ Vue 3 con Reactividad | Composition API | Demostración en vivo</small>
            </div>
        </div>
    </div>

    <script>
        const { createApp, ref } = Vue;

        createApp({
            setup() {
                const count = ref(0);
                const message = ref('');
                const newTask = ref('');
                const tasks = ref([
                    { text: 'Aprender Vue.js', completed: false },
                    { text: 'Hacer demo interactiva', completed: false }
                ]);

                const increment = () => count.value++;
                const decrement = () => count.value--;
                const reset = () => count.value = 0;

                const addTask = () => {
                    if (newTask.value.trim()) {
                        tasks.value.push({ text: newTask.value, completed: false });
                        newTask.value = '';
                    }
                };

                const removeTask = (index) => {
                    tasks.value.splice(index, 1);
                };

                return {
                    count, message, newTask, tasks,
                    increment, decrement, reset, addTask, removeTask
                };
            }
        }).mount('#app');
    </script>
</body>
</html>
